# golangci-lint 配置文件
# 文档: https://golangci-lint.run/usage/configuration/

run:
  # 超时时间
  timeout: 5m

  # 要检查的目录
  tests: true

  # 跳过的目录
  skip-dirs:
    - vendor
    - bin
    - .git

  # 跳过的文件
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*_test\\.go$"

# 输出配置
output:
  # 输出格式: colored-line-number|line-number|json|tab|checkstyle|code-climate
  format: colored-line-number

  # 打印检查的文件名
  print-issued-lines: true

  # 打印 linter 名称
  print-linter-name: true

# Linters 配置
linters:
  # 禁用所有默认 linters
  disable-all: true

  # 启用的 linters
  enable:
    - errcheck      # 检查未处理的错误
    - gosimple      # 简化代码
    - govet         # 检查可疑的构造
    - ineffassign   # 检查无效的赋值
    - staticcheck   # 静态分析
    - typecheck     # 类型检查
    - unused        # 检查未使用的常量、变量、函数和类型
    - gofmt         # 检查代码格式
    - goimports     # 检查 import 顺序
    - misspell      # 检查拼写错误
    - gocritic      # 代码审查
    - gocyclo       # 检查函数复杂度
    - dupl          # 检查重复代码
    - gosec         # 安全检查
    - unconvert     # 检查不必要的类型转换
    - unparam       # 检查未使用的函数参数
    - prealloc      # 检查可以预分配的切片

# Linters 设置
linters-settings:
  # errcheck 配置
  errcheck:
    # 检查类型断言
    check-type-assertions: true
    # 检查空白标识符
    check-blank: false

  # govet 配置
  govet:
    # 检查 shadow 变量
    check-shadowing: true

  # gocyclo 配置
  gocyclo:
    # 最小复杂度
    min-complexity: 15

  # dupl 配置
  dupl:
    # 重复代码的最小行数
    threshold: 100

  # gocritic 配置
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc

  # gosec 配置
  gosec:
    excludes:
      - G104  # 未检查的错误（由 errcheck 处理）

  # misspell 配置
  misspell:
    locale: US

  # goimports 配置
  goimports:
    local-prefixes: github.com/jihongxing/gopay

# Issues 配置
issues:
  # 排除的规则
  exclude-rules:
    # 排除测试文件的某些检查
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec

    # 排除生成的文件
    - path: \.pb\.go$
      linters:
        - gofmt
        - goimports
        - govet

  # 最大 issues 数量（0 表示无限制）
  max-issues-per-linter: 0

  # 最大相同 issues 数量（0 表示无限制）
  max-same-issues: 0

  # 显示所有 issues
  new: false

  # 排除默认的排除规则
  exclude-use-default: false

# 严重性配置
severity:
  # 默认严重性
  default-severity: error

  # 规则
  rules:
    - linters:
        - dupl
      severity: info
