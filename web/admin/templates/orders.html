<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - GoPay 管理后台</title>
    <link rel="stylesheet" href="/admin/static/css/main.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>GoPay 管理后台</h2>
            </div>
            <nav class="nav">
                <a href="/admin" class="nav-item">
                    <span class="icon">📊</span>
                    <span>数据概览</span>
                </a>
                <a href="/admin/orders" class="nav-item active">
                    <span class="icon">📦</span>
                    <span>订单管理</span>
                </a>
                <a href="/admin/apps" class="nav-item">
                    <span class="icon">🔧</span>
                    <span>应用管理</span>
                </a>
                <a href="/admin/config-logs" class="nav-item">
                    <span class="icon">📜</span>
                    <span>配置日志</span>
                </a>
                <a href="/admin/reconciliation" class="nav-item">
                    <span class="icon">📋</span>
                    <span>对账报告</span>
                </a>
                <a href="/admin/logs" class="nav-item">
                    <span class="icon">📝</span>
                    <span>操作日志</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="orders-page">
                <div class="page-header">
                    <h1>订单管理</h1>
                    <div class="actions">
                        <button class="btn btn-primary" onclick="showSearchDialog()">🔍 搜索订单</button>
                    </div>
                </div>

                <div class="filters">
                    <div class="filter-group">
                        <label>支付渠道</label>
                        <select id="filter-channel" onchange="applyFilters()">
                            <option value="">全部</option>
                            <option value="wechat">微信支付</option>
                            <option value="alipay">支付宝</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>订单状态</label>
                        <select id="filter-status" onchange="applyFilters()">
                            <option value="">全部</option>
                            <option value="pending">待支付</option>
                            <option value="paid">已支付</option>
                            <option value="failed">失败</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>通知状态</label>
                        <select id="filter-notify-status" onchange="applyFilters()">
                            <option value="">全部</option>
                            <option value="pending">待通知</option>
                            <option value="notified">已通知</option>
                            <option value="failed">通知失败</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>开始日期</label>
                        <input type="date" id="filter-start-date" onchange="applyFilters()">
                    </div>

                    <div class="filter-group">
                        <label>结束日期</label>
                        <input type="date" id="filter-end-date" onchange="applyFilters()">
                    </div>

                    <button class="btn" onclick="resetFilters()">重置</button>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
                                <th>订单号</th>
                                <th>商户订单号</th>
                                <th>应用ID</th>
                                <th>金额</th>
                                <th>渠道</th>
                                <th>订单状态</th>
                                <th>通知状态</th>
                                <th>重试次数</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody">
                            <tr>
                                <td colspan="11" class="loading">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="pagination"></div>

                <div class="batch-actions" id="batch-actions" style="display: none;">
                    <span id="selected-count">已选择 0 项</span>
                    <button class="btn btn-primary" onclick="batchRetry()">批量重试</button>
                </div>
            </div>
        </main>
    </div>

    <!-- 搜索对话框 -->
    <div id="search-dialog" class="dialog" style="display: none;">
        <div class="dialog-content">
            <div class="dialog-header">
                <h3>搜索订单</h3>
                <button class="close-btn" onclick="closeSearchDialog()">×</button>
            </div>
            <div class="dialog-body">
                <div class="form-group">
                    <label>商户订单号</label>
                    <input type="text" id="search-out-trade-no" placeholder="请输入商户订单号">
                </div>
            </div>
            <div class="dialog-footer">
                <button class="btn" onclick="closeSearchDialog()">取消</button>
                <button class="btn btn-primary" onclick="searchOrder()">搜索</button>
            </div>
        </div>
    </div>

    <!-- 订单详情对话框 -->
    <div id="order-detail-dialog" class="dialog" style="display: none;">
        <div class="dialog-content dialog-large">
            <div class="dialog-header">
                <h3>订单详情</h3>
                <button class="close-btn" onclick="closeOrderDetail()">×</button>
            </div>
            <div class="dialog-body" id="order-detail-content">
                <!-- 动态加载 -->
            </div>
            <div class="dialog-footer">
                <button class="btn" onclick="closeOrderDetail()">关闭</button>
                <button class="btn btn-primary" id="retry-btn" onclick="retryOrder()" style="display: none;">重试通知</button>
            </div>
        </div>
    </div>

    <script src="/admin/static/js/utils.js"></script>
    <script src="/admin/static/js/api.js"></script>
    <script>
let currentPage = 1;
let currentFilters = {};
let selectedOrders = new Set();

async function loadOrders(page = 1) {
    currentPage = page;
    try {
        const params = {
            page,
            page_size: 20,
            ...currentFilters
        };

        const response = await API.getFailedOrders(params);
        renderOrders(response.orders || []);
        renderPagination(response.total || 0, page, 20);
    } catch (error) {
        console.error('加载订单失败:', error);
        showError('加载订单失败');
    }
}

function renderOrders(orders) {
    const tbody = document.getElementById('orders-tbody');
    if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="11" class="empty">暂无数据</td></tr>';
        return;
    }

    tbody.innerHTML = orders.map(order => `
        <tr>
            <td><input type="checkbox" class="order-checkbox" value="${order.order_no}" onchange="updateSelection()"></td>
            <td>${order.order_no}</td>
            <td>${order.out_trade_no}</td>
            <td>${order.app_id}</td>
            <td>¥${(order.amount / 100).toFixed(2)}</td>
            <td>${formatChannel(order.channel)}</td>
            <td><span class="badge badge-${getStatusClass(order.status)}">${formatStatus(order.status)}</span></td>
            <td><span class="badge badge-${getNotifyStatusClass(order.notify_status)}">${formatNotifyStatus(order.notify_status)}</span></td>
            <td>${order.retry_count || 0}</td>
            <td>${formatTime(order.created_at)}</td>
            <td>
                <button class="btn btn-sm" onclick="viewOrderDetail('${order.order_no}')">详情</button>
                ${order.notify_status === 'failed' ? `<button class="btn btn-sm btn-primary" onclick="retryOrderNotify('${order.order_no}')">重试</button>` : ''}
            </td>
        </tr>
    `).join('');
}

function renderPagination(total, page, pageSize) {
    const totalPages = Math.ceil(total / pageSize);
    const pagination = document.getElementById('pagination');

    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }

    let html = `<span>共 ${total} 条</span>`;

    if (page > 1) {
        html += `<button class="btn btn-sm" onclick="loadOrders(${page - 1})">上一页</button>`;
    }

    html += `<span>第 ${page} / ${totalPages} 页</span>`;

    if (page < totalPages) {
        html += `<button class="btn btn-sm" onclick="loadOrders(${page + 1})">下一页</button>`;
    }

    pagination.innerHTML = html;
}

function applyFilters() {
    currentFilters = {
        channel: document.getElementById('filter-channel').value,
        status: document.getElementById('filter-status').value,
        notify_status: document.getElementById('filter-notify-status').value,
        start_date: document.getElementById('filter-start-date').value,
        end_date: document.getElementById('filter-end-date').value
    };

    Object.keys(currentFilters).forEach(key => {
        if (!currentFilters[key]) delete currentFilters[key];
    });

    loadOrders(1);
}

function resetFilters() {
    document.getElementById('filter-channel').value = '';
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-notify-status').value = '';
    document.getElementById('filter-start-date').value = '';
    document.getElementById('filter-end-date').value = '';
    currentFilters = {};
    loadOrders(1);
}

function showSearchDialog() {
    document.getElementById('search-dialog').style.display = 'flex';
}

function closeSearchDialog() {
    document.getElementById('search-dialog').style.display = 'none';
}

async function searchOrder() {
    const outTradeNo = document.getElementById('search-out-trade-no').value.trim();
    if (!outTradeNo) {
        showError('请输入商户订单号');
        return;
    }

    try {
        const order = await API.searchOrder(outTradeNo);
        closeSearchDialog();
        showOrderDetail(order);
    } catch (error) {
        showError('订单不存在或查询失败');
    }
}

async function viewOrderDetail(orderNo) {
    try {
        const order = await API.getOrderDetail(orderNo);
        showOrderDetail(order);
    } catch (error) {
        showError('加载订单详情失败');
    }
}

function showOrderDetail(order) {
    const content = document.getElementById('order-detail-content');
    content.innerHTML = `
        <div class="detail-grid">
            <div class="detail-item">
                <label>订单号</label>
                <div>${order.order_no}</div>
            </div>
            <div class="detail-item">
                <label>商户订单号</label>
                <div>${order.out_trade_no}</div>
            </div>
            <div class="detail-item">
                <label>应用ID</label>
                <div>${order.app_id}</div>
            </div>
            <div class="detail-item">
                <label>支付渠道</label>
                <div>${formatChannel(order.channel)}</div>
            </div>
            <div class="detail-item">
                <label>支付方式</label>
                <div>${order.pay_method || '-'}</div>
            </div>
            <div class="detail-item">
                <label>订单金额</label>
                <div>¥${(order.amount / 100).toFixed(2)}</div>
            </div>
            <div class="detail-item">
                <label>订单状态</label>
                <div><span class="badge badge-${getStatusClass(order.status)}">${formatStatus(order.status)}</span></div>
            </div>
            <div class="detail-item">
                <label>通知状态</label>
                <div><span class="badge badge-${getNotifyStatusClass(order.notify_status)}">${formatNotifyStatus(order.notify_status)}</span></div>
            </div>
            <div class="detail-item">
                <label>重试次数</label>
                <div>${order.retry_count || 0}</div>
            </div>
            <div class="detail-item">
                <label>通知URL</label>
                <div class="text-break">${order.notify_url || '-'}</div>
            </div>
            <div class="detail-item">
                <label>渠道订单号</label>
                <div>${order.channel_order_no || '-'}</div>
            </div>
            <div class="detail-item">
                <label>支付URL</label>
                <div class="text-break">${order.pay_url || '-'}</div>
            </div>
            <div class="detail-item">
                <label>创建时间</label>
                <div>${formatTime(order.created_at)}</div>
            </div>
            <div class="detail-item">
                <label>支付时间</label>
                <div>${order.paid_at ? formatTime(order.paid_at) : '-'}</div>
            </div>
            <div class="detail-item">
                <label>通知时间</label>
                <div>${order.notified_at ? formatTime(order.notified_at) : '-'}</div>
            </div>
            <div class="detail-item">
                <label>更新时间</label>
                <div>${formatTime(order.updated_at)}</div>
            </div>
        </div>
    `;

    const retryBtn = document.getElementById('retry-btn');
    if (order.status === 'paid' && order.notify_status === 'failed') {
        retryBtn.style.display = 'inline-block';
        retryBtn.setAttribute('data-order-no', order.order_no);
    } else {
        retryBtn.style.display = 'none';
    }

    document.getElementById('order-detail-dialog').style.display = 'flex';
}

function closeOrderDetail() {
    document.getElementById('order-detail-dialog').style.display = 'none';
}

async function retryOrderNotify(orderNo) {
    if (!confirm('确定要重试通知吗?')) return;

    try {
        await API.retryOrder(orderNo);
        showSuccess('重试任务已提交');
        loadOrders(currentPage);
    } catch (error) {
        showError('重试失败');
    }
}

async function retryOrder() {
    const orderNo = document.getElementById('retry-btn').getAttribute('data-order-no');
    await retryOrderNotify(orderNo);
    closeOrderDetail();
}

function toggleSelectAll() {
    const checked = document.getElementById('select-all').checked;
    document.querySelectorAll('.order-checkbox').forEach(cb => {
        cb.checked = checked;
        if (checked) {
            selectedOrders.add(cb.value);
        } else {
            selectedOrders.delete(cb.value);
        }
    });
    updateSelection();
}

function updateSelection() {
    selectedOrders.clear();
    document.querySelectorAll('.order-checkbox:checked').forEach(cb => {
        selectedOrders.add(cb.value);
    });

    const batchActions = document.getElementById('batch-actions');
    const selectedCount = document.getElementById('selected-count');

    if (selectedOrders.size > 0) {
        batchActions.style.display = 'flex';
        selectedCount.textContent = `已选择 ${selectedOrders.size} 项`;
    } else {
        batchActions.style.display = 'none';
    }
}

async function batchRetry() {
    if (selectedOrders.size === 0) {
        showError('请先选择订单');
        return;
    }

    if (!confirm(`确定要批量重试 ${selectedOrders.size} 个订单吗?`)) return;

    try {
        const result = await API.batchRetry(Array.from(selectedOrders));
        showSuccess(`批量重试完成：成功 ${result.success}，失败 ${result.failed}`);
        selectedOrders.clear();
        loadOrders(currentPage);
    } catch (error) {
        showError('批量重试失败');
    }
}

function getStatusClass(status) {
    const map = {
        'pending': 'warning',
        'paid': 'success',
        'failed': 'error'
    };
    return map[status] || 'default';
}

function getNotifyStatusClass(status) {
    const map = {
        'pending': 'warning',
        'notified': 'success',
        'failed': 'error'
    };
    return map[status] || 'default';
}

loadOrders(1);
    </script>
</body>
</html>
