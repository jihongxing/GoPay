<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对账报告 - GoPay 管理后台</title>
    <link rel="stylesheet" href="/admin/static/css/main.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>GoPay 管理后台</h2>
            </div>
            <nav class="nav">
                <a href="/admin" class="nav-item">
                    <span class="icon">📊</span>
                    <span>数据概览</span>
                </a>
                <a href="/admin/orders" class="nav-item">
                    <span class="icon">📦</span>
                    <span>订单管理</span>
                </a>
                <a href="/admin/apps" class="nav-item">
                    <span class="icon">🔧</span>
                    <span>应用管理</span>
                </a>
                <a href="/admin/config-logs" class="nav-item">
                    <span class="icon">📜</span>
                    <span>配置日志</span>
                </a>
                <a href="/admin/reconciliation" class="nav-item active">
                    <span class="icon">📋</span>
                    <span>对账报告</span>
                </a>
                <a href="/admin/logs" class="nav-item">
                    <span class="icon">📝</span>
                    <span>操作日志</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="reconciliation-page">
                <div class="page-header">
                    <h1>对账报告</h1>
                </div>

                <div class="filters">
                    <div class="filter-group">
                        <label>支付渠道</label>
                        <select id="filter-channel" onchange="applyFilters()">
                            <option value="">全部</option>
                            <option value="wechat">微信支付</option>
                            <option value="alipay">支付宝</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>对账状态</label>
                        <select id="filter-status" onchange="applyFilters()">
                            <option value="">全部</option>
                            <option value="success">成功</option>
                            <option value="failed">有差异</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>开始日期</label>
                        <input type="date" id="filter-start-date" onchange="applyFilters()">
                    </div>

                    <div class="filter-group">
                        <label>结束日期</label>
                        <input type="date" id="filter-end-date" onchange="applyFilters()">
                    </div>

                    <button class="btn" onclick="resetFilters()">重置</button>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>对账日期</th>
                                <th>支付渠道</th>
                                <th>总订单数</th>
                                <th>匹配订单</th>
                                <th>长款</th>
                                <th>短款</th>
                                <th>金额不匹配</th>
                                <th>对账状态</th>
                                <th>生成时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="reports-tbody">
                            <tr>
                                <td colspan="10" class="loading">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <!-- 对账报告详情对话框 -->
    <div id="report-detail-dialog" class="dialog" style="display: none;">
        <div class="dialog-content dialog-large">
            <div class="dialog-header">
                <h3>对账报告详情</h3>
                <button class="close-btn" onclick="closeReportDetail()">×</button>
            </div>
            <div class="dialog-body" id="report-detail-content">
                <!-- 动态加载 -->
            </div>
            <div class="dialog-footer">
                <button class="btn" onclick="closeReportDetail()">关闭</button>
                <button class="btn btn-primary" id="download-btn" onclick="downloadReport()">下载报告</button>
            </div>
        </div>
    </div>

    <script src="/admin/static/js/utils.js?v=2"></script>
    <script src="/admin/static/js/api.js?v=2"></script>
    <script>
let currentPage = 1;
let currentFilters = {};
let currentReportId = null;

async function loadReports(page = 1) {
    currentPage = page;
    try {
        const params = {
            page,
            page_size: 20,
            ...currentFilters
        };

        const response = await API.getReconciliationReports(params);
        renderReports(response.data || []);
        renderPagination(response.total || 0, page, 20);
    } catch (error) {
        console.error('加载对账报告失败:', error);
        showError('加载对账报告失败');
    }
}

function renderReports(reports) {
    const tbody = document.getElementById('reports-tbody');
    if (reports.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" class="empty">暂无数据</td></tr>';
        return;
    }

    tbody.innerHTML = reports.map(report => `
        <tr>
            <td>${report.date}</td>
            <td>${formatChannel(report.channel)}</td>
            <td>${report.total_orders}</td>
            <td>${report.matched_orders}</td>
            <td>${report.long_orders > 0 ? `<span class="badge badge-warning">${report.long_orders}</span>` : '0'}</td>
            <td>${report.short_orders > 0 ? `<span class="badge badge-error">${report.short_orders}</span>` : '0'}</td>
            <td>${report.amount_mismatch > 0 ? `<span class="badge badge-warning">${report.amount_mismatch}</span>` : '0'}</td>
            <td><span class="badge badge-${report.status === 'success' ? 'success' : 'error'}">${report.status === 'success' ? '成功' : '有差异'}</span></td>
            <td>${formatTime(report.created_at)}</td>
            <td>
                <button class="btn btn-sm" onclick="viewReportDetail(${report.id})">查看详情</button>
            </td>
        </tr>
    `).join('');
}

function renderPagination(total, page, pageSize) {
    const totalPages = Math.ceil(total / pageSize);
    const pagination = document.getElementById('pagination');

    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }

    let html = `<span>共 ${total} 条</span>`;

    if (page > 1) {
        html += `<button class="btn btn-sm" onclick="loadReports(${page - 1})">上一页</button>`;
    }

    html += `<span>第 ${page} / ${totalPages} 页</span>`;

    if (page < totalPages) {
        html += `<button class="btn btn-sm" onclick="loadReports(${page + 1})">下一页</button>`;
    }

    pagination.innerHTML = html;
}

function applyFilters() {
    currentFilters = {
        channel: document.getElementById('filter-channel').value,
        status: document.getElementById('filter-status').value,
        start_date: document.getElementById('filter-start-date').value,
        end_date: document.getElementById('filter-end-date').value
    };

    Object.keys(currentFilters).forEach(key => {
        if (!currentFilters[key]) delete currentFilters[key];
    });

    loadReports(1);
}

function resetFilters() {
    document.getElementById('filter-channel').value = '';
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-start-date').value = '';
    document.getElementById('filter-end-date').value = '';
    currentFilters = {};
    loadReports(1);
}

async function viewReportDetail(reportId) {
    currentReportId = reportId;
    try {
        const report = await API.getReconciliationDetail(reportId);
        showReportDetail(report);
    } catch (error) {
        showError('加载报告详情失败');
    }
}

function showReportDetail(report) {
    const content = document.getElementById('report-detail-content');

    let html = `
        <div class="report-summary">
            <h4>对账汇总</h4>
            <div class="detail-grid">
                <div class="detail-item">
                    <label>对账日期</label>
                    <div>${report.date}</div>
                </div>
                <div class="detail-item">
                    <label>支付渠道</label>
                    <div>${formatChannel(report.channel)}</div>
                </div>
                <div class="detail-item">
                    <label>总订单数</label>
                    <div>${report.total_orders}</div>
                </div>
                <div class="detail-item">
                    <label>匹配订单数</label>
                    <div>${report.matched_orders}</div>
                </div>
                <div class="detail-item">
                    <label>长款订单数</label>
                    <div>${report.long_orders}</div>
                </div>
                <div class="detail-item">
                    <label>短款订单数</label>
                    <div>${report.short_orders}</div>
                </div>
                <div class="detail-item">
                    <label>金额不匹配数</label>
                    <div>${report.amount_mismatch}</div>
                </div>
                <div class="detail-item">
                    <label>对账状态</label>
                    <div><span class="badge badge-${report.status === 'success' ? 'success' : 'error'}">${report.status === 'success' ? '成功' : '有差异'}</span></div>
                </div>
            </div>
        </div>
    `;

    // 长款明细
    if (report.long_order_details && report.long_order_details.length > 0) {
        html += `
            <div class="report-section">
                <h4>长款明细（外部有但内部无）</h4>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>金额</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${report.long_order_details.map(order => `
                            <tr>
                                <td>${order.order_no}</td>
                                <td>¥${(order.amount / 100).toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    // 短款明细
    if (report.short_order_details && report.short_order_details.length > 0) {
        html += `
            <div class="report-section">
                <h4>短款明细（内部有但外部无）⚠️</h4>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>金额</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${report.short_order_details.map(order => `
                            <tr>
                                <td>${order.order_no}</td>
                                <td>¥${(order.amount / 100).toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    // 金额不匹配明细
    if (report.amount_mismatch_details && report.amount_mismatch_details.length > 0) {
        html += `
            <div class="report-section">
                <h4>金额不匹配明细</h4>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>内部金额</th>
                            <th>外部金额</th>
                            <th>差额</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${report.amount_mismatch_details.map(order => `
                            <tr>
                                <td>${order.order_no}</td>
                                <td>¥${(order.internal_amount / 100).toFixed(2)}</td>
                                <td>¥${(order.external_amount / 100).toFixed(2)}</td>
                                <td class="${order.diff > 0 ? 'text-success' : 'text-error'}">¥${(order.diff / 100).toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    content.innerHTML = html;
    document.getElementById('report-detail-dialog').style.display = 'flex';
}

function closeReportDetail() {
    document.getElementById('report-detail-dialog').style.display = 'none';
    currentReportId = null;
}

function downloadReport() {
    if (!currentReportId) return;
    window.open(`/admin/reconciliation/${currentReportId}/download`, '_blank');
}

loadReports(1);
    </script>
</body>
</html>
