apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gopay.fullname" . }}
  labels:
    {{- include "gopay.labels" . | nindent 4 }}
data:
  DB_HOST: {{ .Values.config.dbHost | quote }}
  DB_PORT: {{ .Values.config.dbPort | quote }}
  DB_NAME: {{ .Values.config.dbName | quote }}
  DB_SSLMODE: {{ .Values.config.dbSSLMode | quote }}
  PUBLIC_BASE_URL: {{ .Values.config.publicBaseURL | quote }}
